name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # required to create releases + attach .deb assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libxext-dev libxfixes-dev libxrender-dev \
            libxtst-dev libcairo2-dev

      - name: Build
        run: make

      - name: Verify binary
        run: |
          test -x ./petto
          ./petto --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: petto-bin
          path: petto

  package:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config debhelper devscripts dpkg-dev \
            libx11-dev libxext-dev libxfixes-dev libxrender-dev \
            libxtst-dev libcairo2-dev

      - name: Build .deb
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: petto-deb
          path: dist/*.deb

      - name: Attach .deb to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
